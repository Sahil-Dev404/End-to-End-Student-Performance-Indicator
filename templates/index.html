<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background-color: #0d0d0d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: 50px;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            background-color: #141414;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.03);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        p {
            color: #b0b0b0;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: white;
            color: black;
            padding: 15px 35px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #d9d9d9;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #777777;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .container {
                padding: 35px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Student Exam Performance Predictor</h1>

        <p>
            A machine learning powered web application that predicts a student's
            maths score based on demographic details, reading score,
            writing score, and preparation data.
        </p>

        <a href="/predictdata" class="btn">
            Start Prediction
        </a>

        <div class="footer-text">
            Built with Flask • Machine Learning • Python
        </div>

    </div>

</body>

</html>
