<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
        }

        .main-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #aaaaaa;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #dddddd;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333333;
            background-color: #1c1c1c;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s ease;
        }

        .form-control:focus {
            border-color: #ffffff;
        }

        select option {
            background-color: #1c1c1c;
            color: white;
        }

        .btn {
            margin-top: 10px;
            padding: 15px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #d9d9d9;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: #1b1b1b;
            border: 1px solid #2d2d2d;
            text-align: center;
        }

        .result-box h2 {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .result {
            color: #ffffff;
            font-size: 2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .main-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="main-title">Student Exam Performance Indicator</h1>
        <p class="subtitle">
            Predict student maths performance using machine learning
        </p>

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <div class="form-group">
                <label>Gender</label>
                <select class="form-control" name="gender" required>
                    <option selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select class="form-control" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lunch Type</label>
                <select class="form-control" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation Course</label>
                <select class="form-control" name="test_preparation_course" required>
                    <option selected disabled value="">Select Test Course</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Writing Score out of 100</label>
                <input class="form-control" type="number" name="writing_score"
                    placeholder="Enter Writing Score" min="0" max="100" required>
            </div>

            <div class="form-group">
                <label>Reading Score out of 100</label>
                <input class="form-control" type="number" name="reading_score"
                    placeholder="Enter Reading Score" min="0" max="100" required>
            </div>

            <input class="btn" type="submit" value="Predict Maths Score">

        </form>

        <div class="result-box">
            <h2>Predicted Maths Score</h2>
            <div class="result">{{ results }}</div>
        </div>

    </div>

</body>

</html>
